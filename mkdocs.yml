site_name: ngpb4py
site_description: Python wrapper for running NextGenPB with containerized execution
site_url: https://pedrishi.github.io/ngpb4py
repo_url: https://github.com/pedrishi/ngpb4py
repo_name: pedrishi/ngpb4py

theme:
  name: readthedocs

nav:
  - Overview: index.md
  - Installation: installation.md
  - Quick Start: quickstart.md
  - Configuration: configuration.md
  - Running Jobs: running-jobs.md
  - Results: results.md
  - API Reference: api.md
  - Development: development.md

watch:
  - src

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_root_heading: true
            show_root_full_path: false
            show_source: false

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
